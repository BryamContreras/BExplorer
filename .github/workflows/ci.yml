name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust components
        run: |
          rustup update stable
          rustup default stable
          rustup component add rustfmt clippy
      - name: Install packaging validators
        run: sudo apt-get update && sudo apt-get install -y appstream desktop-file-utils
      - name: Check formatting
        run: cargo fmt --check
      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Run tests
        run: cargo test --all-targets
      - name: Validate Linux metadata
        run: |
          desktop-file-validate assets/linux/bexplorer.desktop
          appstreamcli validate --no-net assets/linux/io.github.BryamContreras.BExplorer.metainfo.xml
      - name: Build Linux packages
        run: scripts/linux/package.sh

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust components
        run: |
          rustup update stable
          rustup default stable
          rustup component add rustfmt clippy
      - name: Check formatting
        run: cargo fmt --check
      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Run tests
        run: cargo test --all-targets
      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress --yes
      - name: Build Windows packages
        shell: powershell
        run: ./scripts/windows/package.ps1
